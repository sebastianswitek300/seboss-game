<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seboss Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="/colyseus.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #6b5ce6 0%, #7b6bf5 100%);
            --card: #ffffff;
            --card-alt: #f5f5ff;
            --text: #1f1d47;
            --text-subtle: #6e6b8a;
            --accent: #6b5ce6;
            --accent-strong: #5a4ac8;
            --success: #3ad29f;
            --danger: #ff6f6f;
            --border: #e4e7fb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 24px 16px 32px;
            color: var(--text);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 12px 40px rgba(50, 38, 139, 0.18);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            margin-bottom: 16px;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
        }

        h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }

        .input-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text); font-size: 14px; }
        input { width: 100%; padding: 14px 16px; background: var(--card-alt); border: 1px solid var(--border); border-radius: 14px; font-family: 'Poppins', sans-serif; font-size: 16px; color: var(--text); transition: border-color 0.2s, box-shadow 0.2s; }
        input::placeholder { color: var(--text-subtle); }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(107, 92, 230, 0.15); }

        button { width: 100%; padding: 14px 18px; background: #FF9B57; border: 1px solid #f28435; border-radius: 16px; color: #1f1d47; font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; box-shadow: 0 14px 32px rgba(255, 155, 87, 0.35); transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s, border-color 0.2s; margin-top: 8px; }
        button:hover { transform: translateY(-1px); box-shadow: 0 18px 36px rgba(255, 155, 87, 0.4); border-color: #f28435; }
        button:active { transform: translateY(1px); box-shadow: 0 12px 22px rgba(255, 155, 87, 0.3); }
        button:disabled, .disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; transform: none; }

        .hidden { display: none; }

        .players-list { background: var(--card-alt); border: 1px solid var(--border); border-radius: 20px; padding: 18px; }
        .player-item { padding: 12px 14px; background: var(--card); border: 1px solid var(--border); margin-bottom: 10px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 6px 14px rgba(26, 23, 68, 0.08); }
        .player-nickname { font-weight: 700; font-size: 16px; color: var(--text); }
        .host-badge { background: linear-gradient(135deg, #ffd166, #fca311); color: #1f1d47; padding: 6px 10px; border-radius: 12px; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 6px 14px rgba(252, 163, 17, 0.4); }

        .question-text { background: var(--card-alt); border: 1px solid var(--border); color: var(--text); padding: 20px; border-radius: 20px; text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 16px; }

        .answers-container { margin: 22px 0; }
        .answer-item { background: var(--card); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; border-radius: 16px; cursor: move; display: flex; align-items: center; gap: 14px; transition: all 0.2s; touch-action: none; box-shadow: 0 8px 20px rgba(26, 23, 68, 0.08); }
        .answer-item:hover { transform: translateX(4px); box-shadow: 0 10px 24px rgba(26,23,68,0.12); }
        .answer-number { background: var(--accent); color: #fff; width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; box-shadow: 0 6px 14px rgba(91, 74, 200, 0.25); }
        .answer-text { font-size: 16px; font-weight: 600; color: var(--text); }
        .sortable-ghost { opacity: 0.3; } .sortable-drag { opacity: 0.9; }

        .results-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 26px rgba(26, 23, 68, 0.12); }
        .results-table th { background: var(--card-alt); color: var(--text); padding: 16px 14px; text-align: left; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .results-table td { padding: 14px 14px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600; color: var(--text); }
        .results-table tr:hover td { background: #f7f7ff; }

        .score-badge { background: linear-gradient(135deg, #6b5ce6, #7f6bf5); color: #fff; padding: 8px 12px; border-radius: 12px; font-weight: 700; font-size: 14px; box-shadow: 0 8px 18px rgba(91, 74, 200, 0.3); display: inline-block; }

        .selected-answer { background: #e8e5ff !important; border: 3px solid var(--accent) !important; font-weight: 700 !important; position: relative; }
        .selected-answer::before { content: '✓'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 24px; color: var(--accent); font-weight: bold; }
        .correct-answer { background: #e5fbf3 !important; border: 3px solid var(--success) !important; box-shadow: 0 0 0 3px rgba(58, 210, 159, 0.2) !important; position: relative; }
        .correct-answer::before { content: '✓'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 24px; color: var(--success); font-weight: bold; }
        .wrong-answer { background: #ffe8eb !important; border: 3px solid var(--danger) !important; position: relative; }
        .wrong-answer::before { content: '✗'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 24px; color: var(--danger); font-weight: bold; }

        .messages { position: fixed; top: 20px; right: 20px; max-width: 350px; z-index: 1000; }
        .message { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 14px 16px; border-radius: 14px; margin-bottom: 12px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 20px rgba(26, 23, 68, 0.15); animation: slideInBounce 0.35s ease-out; }
        .message.success { background: #e5fbf3; border-color: var(--success); }
        @keyframes slideInBounce { 0% { transform: translateX(300px); opacity: 0; } 60% { transform: translateX(-12px); opacity: 1; } 100% { transform: translateX(0); } }

        .waiting-message { text-align: center; color: var(--text); font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0; animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity: 0.75; transform: scale(1.03);} }

        .led-scoreboard { background: var(--card-alt); border: 1px solid var(--border); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(26, 23, 68, 0.12); position: relative; overflow: hidden; }
        .led-answer-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; margin-bottom: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; font-size: 18px; font-weight: 700; color: var(--text); text-transform: none; letter-spacing: 0.5px; transition: all 0.3s; cursor: move; }
        .led-answer-row.revealed { animation: revealGlow 0.5s ease-in-out; }
        .led-answer-row.hidden { color: transparent; text-shadow: none; }
        .led-number { display: inline-block; min-width: 40px; text-align: center; color: #fff; background: var(--accent); padding: 6px 10px; border-radius: 12px; margin-right: 12px; }
        .led-text { flex: 1; position: relative; }
        .led-score { min-width: 60px; text-align: right; font-size: 20px; color: var(--text); }
        .led-suma { display: flex; justify-content: flex-end; align-items: center; margin-top: 20px; padding: 15px 20px; font-size: 22px; font-weight: 900; color: var(--text); gap: 20px; }
        @keyframes revealGlow { 0% { box-shadow: 0 0 6px rgba(107,92,230,0.5);} 50% { box-shadow: 0 0 22px rgba(107,92,230,0.55);} 100% { box-shadow: 0 0 10px rgba(107,92,230,0.35);} }

        .game-board-container { max-width: 900px; margin: 0 auto; }
        .question-board { background: var(--card-alt); padding: 18px; border-radius: 18px; margin-bottom: 18px; text-align: center; border: 1px solid var(--border); }
        .question-board h2 { color: var(--text); font-size: 20px; font-weight: 700; margin: 0; }

        .logo-question { display: flex; justify-content: center; margin-bottom: 16px; }
        .logo-image { max-width: 220px; width: 100%; height: auto; border: 8px solid var(--card); border-radius: 20px; box-shadow: 0 12px 26px rgba(26,23,68,0.18); background: #fff; }

        .logo-options, .audio-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .logo-option { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; font-size: 16px; font-weight: 600; color: var(--text); cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; box-shadow: 0 6px 14px rgba(26,23,68,0.08); }
        .logo-option:hover { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(26,23,68,0.12); }
        .logo-option input { width: 18px; height: 18px; accent-color: var(--accent); }
        .logo-option input:disabled { cursor: not-allowed; }
        .logo-option:has(input:disabled) { cursor: not-allowed; }
        .logo-option:has(input:disabled):not(.selected-answer):not(.correct-answer):not(.wrong-answer) { opacity: 0.5; }

        .audio-question { margin-bottom: 12px; }
        .audio-player { width: 100%; border: 1px solid var(--border); border-radius: 12px; background: #fff; box-shadow: 0 6px 12px rgba(0,0,0,0.12); }
        .audio-controls { margin: 10px 0 16px 0; }
        .audio-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .audio-title { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; text-transform: uppercase; margin: 0 0 8px 0; }

        .position-score { margin-left: 10px; padding: 4px 8px; border-radius: 8px; background: rgba(255,255,255,0.8); border: 2px solid var(--accent); font-weight: 700; font-size: 12px; color: var(--text); }
        .round-score { margin: 8px 0 12px 0; font-size: 14px; font-weight: 700; color: var(--text-subtle); }

        /* Hidden audio for UI feedback */
        #tapSound {
            display: none;
        }
    </style>

</head>
<body>
    <div class="messages" id="messages"></div>

        <div class="container">
            <!-- Login Screen -->
            <div id="loginScreen" class="card">
            <h1>Seboss Game</h1>
            <div class="input-group">
                <label for="nickname">Wpisz swój nick:</label>
                <input type="text" id="nickname" placeholder="Twój nickname" maxlength="20">
            </div>
            <button id="joinBtn">Dołącz do gry</button>
        </div>

        <!-- Lobby Screen -->
        <div id="lobbyScreen" class="card hidden">
            <h1>Poczekalnia</h1>
            <div class="players-list">
                <h3>Gracze (<span id="playerCount">0</span>/6):</h3>
                <div id="playersList"></div>
            </div>
            <button id="startBtn" class="hidden">Rozpocznij grę</button>
            <div class="waiting-message" id="waitingMessage">Oczekiwanie na hosta...</div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="hidden">
            <div class="game-board-container">
                <div class="question-board">
                    <h2 id="questionText"></h2>
                </div>
                <div class="led-scoreboard">
                    <div id="answersContainer"></div>
                    <div class="led-suma">
                        <span>SUMA</span>
                        <span class="led-suma-value" id="totalScore">0</span>
                    </div>
                </div>
                <button id="submitBtn" style="margin-top: 20px;">Zatwierdź odpowiedzi</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="card hidden">
            <h1>Wyniki gry</h1>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Miejsce</th>
                        <th>Gracz</th>
                        <th>Punkty</th>
                    </tr>
                </thead>
                <tbody id="resultsTable"></tbody>
            </table>
        </div>
    </div>

    <script src="game.js"></script>
    <audio id="tapSound" src="/ui-sound/confirm-tap.mp3" preload="auto"></audio>
</body>
</html>
